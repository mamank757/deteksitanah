<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETEKSI TEKSTUR TANAH - PPL Milenial Wajo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1412; 
            --card-bg: rgba(45, 38, 34, 0.8);
            --accent-color: #2ecc71; 
            --text-color: #f5f5f5;
            --border-color: rgba(46, 204, 113, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #2d2622 0%, #1a1412 100%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        h1 { 
            color: var(--accent-color); 
            font-size: 1.6rem; 
            font-weight: 800;
            margin-bottom: 5px; 
            text-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            padding: 2rem;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #preview {
    max-width: 100%;
    max-height: 250px;
    object-fit: contain; 
    border-radius: 15px;
    display: none;
    margin-top: 10px;
}

        .scanner-line {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color);
            z-index: 10;
            animation: scan 2.5s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .spinner {
            display: none; width: 40px; height: 40px; margin: 20px auto;
            border: 4px solid rgba(46, 204, 113, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        button {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none; color: #fff; padding: 16px;
            border-radius: 15px; cursor: pointer; width: 100%;
            font-weight: 600; text-transform: uppercase;
            transition: 0.4s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #result {
            margin-top: 1.5rem; padding: 1.2rem;
            border-radius: 20px; background: rgba(0, 0, 0, 0.4);
            display: none; border: 1px solid var(--border-color);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .label { font-size: 1.4rem; font-weight: 800; color: var(--accent-color); }
        table { width: 100%; color: #fff; font-size: 0.85rem; margin-top: 10px; }
        td { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>DETEKTOR TANAH</h1>
    <p style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 20px;">PPL Milenial Wajo</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="scanner-line" id="scanner"></div>
        <p id="msg">Klik untuk Upload Foto Sampel</p>
        <img id="preview">
        <input type="file" id="fileInput" accept="image/*" hidden onchange="previewImage(event)">
    </div>

    <button id="btnDetect" onclick="detectSoil()">Mulai Analisis</button>
    <div class="spinner" id="loader"></div>

    <div id="result">
        <div class="label" id="resLabel">---</div>
        <div id="resConf"></div>
        <div style="margin-top: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px;">
            <canvas id="textureTriangle" width="300" height="260" style="max-width: 100%;"></canvas>
        </div>
    </div>
</div>

<script>
    // 1. FUNGSI PREVIEW (Agar foto galeri muncul)
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            const preview = document.getElementById('preview');
            const msg = document.getElementById('msg');
            
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                msg.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    function drawTriangle(label) {
        const canvas = document.getElementById('textureTriangle');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const top = { x: 150, y: 35 };     
        const left = { x: 35, y: 225 };    
        const right = { x: 265, y: 225 };  

        // Garis Pembatas (Warna Hijau Transparan)
        ctx.strokeStyle = 'rgba(46, 204, 113, 0.2)';
        ctx.lineWidth = 1;
        const levels = [0.2, 0.4, 0.6, 0.8];
        levels.forEach(lvl => {
            let y = 225 - (lvl * 190);
            let xStart = 35 + (lvl * 115 * 0.5);
            let xEnd = 265 - (lvl * 115 * 0.5);
            ctx.beginPath(); ctx.moveTo(xStart, y); ctx.lineTo(xEnd, y); ctx.stroke();
        });

        // Segitiga Utama (Warna Hijau Neon)
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(46, 204, 113, 0.6)';
        ctx.strokeStyle = '#2ecc71';
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(top.x, top.y); ctx.lineTo(left.x, left.y); ctx.lineTo(right.x, right.y); ctx.closePath(); ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#2ecc71';
        ctx.font = 'bold 11px Poppins';
        ctx.fillText("LIAT", top.x - 13, top.y - 12);
        ctx.fillText("PASIR", left.x - 30, left.y + 18);
        ctx.fillText("DEBU", right.x - 5, right.y + 18);

        let dot = { x: 150, y: 130 };
        const labelLower = label.toLowerCase();
        if (labelLower.includes("clay")) dot = { x: 150, y: 80 };
        else if (labelLower.includes("sandy")) dot = { x: 90, y: 200 };
        else if (labelLower.includes("loam")) dot = { x: 150, y: 180 };
        else if (labelLower.includes("alluvial")) dot = { x: 200, y: 190 };

        ctx.shadowBlur = 15;
        ctx.shadowColor = "#e74c3c"; // Titik tetap merah agar kontras dengan hijau
        ctx.beginPath(); ctx.arc(dot.x, dot.y, 7, 0, Math.PI * 2);
        ctx.fillStyle = '#e74c3c'; ctx.fill();
    }

      const kamusTanah = {
    "Alluvial": { "nama": "Tanah Alluvial", "pH": "6.0 - 7.0", "organik": "Sedang", "npk": "Tinggi", "subur": "Sangat Subur", "tanaman": "Padi, Palawija, Tebu", "saran": "Ideal untuk Padi. Jaga sirkulasi air." },
    "Black": { "nama": "Tanah Hitam", "pH": "6.5 - 7.5", "organik": "Tinggi", "npk": "Tinggi", "subur": "Subur", "tanaman": "Kapas, Kedelai, Jagung", "saran": "Bagus untuk Kedelai. Olah saat lembap." },
    "Cinder": { "nama": "Tanah Vulkanik", "pH": "5.0 - 7.0", "organik": "Tinggi", "npk": "Sangat Tinggi", "subur": "Sangat Subur", "tanaman": "Sayuran, Kopi, Buah-buahan", "saran": "Terbaik untuk Sayuran/Horti." },
    "Clay": { "nama": "Tanah Liat", "pH": "4.5 - 6.0", "organik": "Sedang", "npk": "Sedang", "subur": "Sedang", "tanaman": "Padi, Rumput Gajah", "saran": "Drainase wajib lancar agar tak busuk." },
    "Laterite": { "nama": "Tanah Laterit", "pH": "4.0 - 5.5", "organik": "Rendah", "npk": "Rendah", "subur": "Kurang", "tanaman": "Kelapa Sawit, Karet", "saran": "Tambah pupuk organik & kapur." },
    "Loamy": { "nama": "Tanah Lempung", "pH": "6.0 - 7.0", "organik": "Tinggi", "npk": "Tinggi", "subur": "Sangat Subur", "tanaman": "Hampir Semua Jenis Tanaman", "saran": "Tanah prima untuk semua tanaman." },
    "loam": { "nama": "Tanah Lempung", "pH": "6.0 - 7.0", "organik": "Tinggi", "npk": "Tinggi", "subur": "Sangat Subur", "tanaman": "Hampir Semua Jenis Tanaman", "saran": "Tanah prima untuk semua tanaman." },
    "Peat": { "nama": "Tanah Gambut", "pH": "3.0 - 5.0", "organik": "Sangat Tinggi", "npk": "Rendah", "subur": "Rendah", "tanaman": "Nanas, Kelapa Sawit", "saran": "Beri Dolomit & parit drainase." },
    "Red": { "nama": "Tanah Merah", "pH": "4.5 - 5.5", "organik": "Rendah", "npk": "Rendah", "subur": "Kurang", "tanaman": "Ubi Kayu, Karet", "saran": "Beri SP-36 dosis ekstra." },
    "Sandy": { "nama": "Tanah Berpasir", "pH": "5.5 - 7.0", "organik": "Rendah", "npk": "Rendah", "subur": "Rendah", "tanaman": "Kelapa, Semangka, Kacang Tanah", "saran": "Wajib tambah kompos tiap musim." },
    "Yellow": { "nama": "Tanah Kuning", "pH": "4.5 - 5.5", "organik": "Rendah", "npk": "Rendah", "subur": "Kurang", "tanaman": "Tanaman Keras/Kehutanan", "saran": "Pakai mulsa agar tak tererosi." }
};

    // 4. FUNGSI ANALISIS
    async function detectSoil() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) return alert('Pilih foto terlebih dahulu!');

        // Ganti dengan URL web app Apps Script Anda
        const urlAppScript = "https://script.google.com/macros/s/AKfycbwe27jOBXR9DnTi9hIWLAwT1kMGf3rRSEFeM1xMCVOiWOhYyOkXol1kmpKGSPqAwkNgDw/exec";

        document.getElementById('loader').style.display = 'block';
        document.getElementById('scanner').style.display = 'block';
        document.getElementById('btnDetect').disabled = true;
        document.getElementById('result').style.display = 'none';

        const reader = new FileReader();
        reader.onload = async function() {
            const base64Data = reader.result.split(',')[1];
            try {
                const response = await fetch(urlAppScript, {
                    method: "POST",
                    body: JSON.stringify({ image: base64Data })
                });
                const data = await response.json();
                
                // Asumsi struktur response: data.outputs[0].soil_type.predicted_classes[0]
                const labelRaw = data.outputs[0].soil_type.predicted_classes[0];
                const conf = (data.outputs[0].soil_type.predictions[labelRaw].confidence * 100).toFixed(1);
                const info = kamusTanah[labelRaw] || { "nama": labelRaw, "subur": "-", "pH": "-", "tanaman": "-", "saran": "Cek pH manual." };

                document.getElementById('resLabel').innerText = info.nama;
                document.getElementById('resConf').innerHTML = `
                    <div style="color: #2ecc71; margin-bottom: 10px;">Akurasi: ${conf}%</div>
                    <table>
                        <tr><td>Kesuburan</td><td align="right">${info.subur}</td></tr>
                        <tr><td>Estimasi pH</td><td align="right">${info.pH}</td></tr>
                        <tr><td>Tanaman</td><td align="right">${info.tanaman}</td></tr>
                    </table>
                    <p style="font-size: 0.8rem; margin-top:10px;"><b>Saran:</b> ${info.saran}</p>
                `;
                
                document.getElementById('result').style.display = 'block';
                drawTriangle(labelRaw);

            } catch (err) {
                alert("Koneksi gagal atau Server sibuk.");
                console.error(err);
            } finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('scanner').style.display = 'none';
                document.getElementById('btnDetect').disabled = false;
            }
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
</script>

</body>
</html>
