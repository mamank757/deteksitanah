<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETEKSI TEKSTUR TANAH - PPL Milenial Wajo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1412; /* Coklat Tanah Gelap */
            --card-bg: rgba(45, 38, 34, 0.6); /* Coklat Muda Transparan */
            --accent-color: #2ecc71; /* Hijau Daun Segar */
            --text-color: #f5f5f5;
            --border-color: rgba(46, 204, 113, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Tambahan gradient halus di background */
            background: radial-gradient(circle at center, #2d2622 0%, #1a1412 100%);
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        h1 { 
            color: var(--accent-color); 
            font-size: 1.6rem; 
            font-weight: 800;
            letter-spacing: 1px; 
            margin-bottom: 5px; 
            text-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            padding: 2rem;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: 0.3s;
            background: rgba(0, 0, 0, 0.2);
        }

        .upload-area:hover { border-color: var(--accent-color); background: rgba(46, 204, 113, 0.05); }

        #preview { max-width: 100%; border-radius: 15px; display: none; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .scanner-line {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color);
            z-index: 2;
            animation: scan 2.5s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .spinner {
            display: none; width: 45px; height: 45px; margin: 20px auto;
            border: 4px solid rgba(46, 204, 113, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        button {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            border: none;
            color: #fff;
            padding: 16px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        button:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.5);
        }

        #result {
            margin-top: 1.5rem;
            padding: 1.2rem;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .label { font-size: 1.4rem; font-weight: 800; color: var(--accent-color); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>DETEKTOR TEKSTUR TANAH</h1>
    <p style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 25px; line-height: 1.4;">
        Analisis Tekstur, pH, Hara, dan Rekomendasi Tanaman <br><b>PPL Milenial Wajo</b>
    </p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="scanner-line" id="scanner"></div>
        <p id="msg" style="font-size: 0.9rem;">Foto Sampel Tanah</p>
        <input type="file" id="fileInput" accept="image/*" hidden onchange="previewImage(event)">
        <img id="preview">
    </div>

    <button id="btnDetect" onclick="detectSoil()">Analisis Tanah</button>
    <div class="spinner" id="loader"></div>

    <div id="result">
        <span class="label" id="resLabel">---</span>
        <div id="resConf"></div>
        <div style="margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px;">
            <canvas id="textureTriangle" width="300" height="260" style="max-width: 100%;"></canvas>
            <p style="font-size: 0.65rem; opacity: 0.5; margin-top: 8px;">Diagram Tekstur Tanah USDA</p>
        </div>
    </div>
</div>

<script>
    // Fungsi preview, drawTriangle, kamusTanah, dan detectSoil tetap sama 
    // namun pastikan warna di drawTriangle juga disesuaikan ke HIJAU:
    
    function drawTriangle(label) {
        const canvas = document.getElementById('textureTriangle');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const top = { x: 150, y: 35 };     
        const left = { x: 35, y: 225 };    
        const right = { x: 265, y: 225 };  

        // Garis Pembatas (Warna Hijau Transparan)
        ctx.strokeStyle = 'rgba(46, 204, 113, 0.2)';
        ctx.lineWidth = 1;
        const levels = [0.2, 0.4, 0.6, 0.8];
        levels.forEach(lvl => {
            let y = 225 - (lvl * 190);
            let xStart = 35 + (lvl * 115 * 0.5);
            let xEnd = 265 - (lvl * 115 * 0.5);
            ctx.beginPath(); ctx.moveTo(xStart, y); ctx.lineTo(xEnd, y); ctx.stroke();
        });

        // Segitiga Utama (Warna Hijau Neon)
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(46, 204, 113, 0.6)';
        ctx.strokeStyle = '#2ecc71';
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(top.x, top.y); ctx.lineTo(left.x, left.y); ctx.lineTo(right.x, right.y); ctx.closePath(); ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#2ecc71';
        ctx.font = 'bold 11px Poppins';
        ctx.fillText("LIAT", top.x - 13, top.y - 12);
        ctx.fillText("PASIR", left.x - 30, left.y + 18);
        ctx.fillText("DEBU", right.x - 5, right.y + 18);

        let dot = { x: 150, y: 130 };
        const labelLower = label.toLowerCase();
        if (labelLower.includes("clay")) dot = { x: 150, y: 80 };
        else if (labelLower.includes("sandy")) dot = { x: 90, y: 200 };
        else if (labelLower.includes("loam")) dot = { x: 150, y: 180 };
        else if (labelLower.includes("alluvial")) dot = { x: 200, y: 190 };

        ctx.shadowBlur = 15;
        ctx.shadowColor = "#e74c3c"; // Titik tetap merah agar kontras dengan hijau
        ctx.beginPath(); ctx.arc(dot.x, dot.y, 7, 0, Math.PI * 2);
        ctx.fillStyle = '#e74c3c'; ctx.fill();
    }

      const kamusTanah = {
    "Alluvial": { "nama": "Tanah Alluvial", "pH": "6.0 - 7.0", "organik": "Sedang", "npk": "Tinggi", "subur": "Sangat Subur", "tanaman": "Padi, Palawija, Tebu", "saran": "Ideal untuk Padi. Jaga sirkulasi air." },
    "Black": { "nama": "Tanah Hitam", "pH": "6.5 - 7.5", "organik": "Tinggi", "npk": "Tinggi", "subur": "Subur", "tanaman": "Kapas, Kedelai, Jagung", "saran": "Bagus untuk Kedelai. Olah saat lembap." },
    "Cinder": { "nama": "Tanah Vulkanik", "pH": "5.0 - 7.0", "organik": "Tinggi", "npk": "Sangat Tinggi", "subit": "Sangat Subur", "tanaman": "Sayuran, Kopi, Buah-buahan", "saran": "Terbaik untuk Sayuran/Horti." },
    "Clay": { "nama": "Tanah Liat", "pH": "4.5 - 6.0", "organik": "Sedang", "npk": "Sedang", "subur": "Sedang", "tanaman": "Padi, Rumput Gajah", "saran": "Drainase wajib lancar agar tak busuk." },
    "Laterite": { "nama": "Tanah Laterit", "pH": "4.0 - 5.5", "organik": "Rendah", "npk": "Rendah", "subur": "Kurang", "tanaman": "Kelapa Sawit, Karet", "saran": "Tambah pupuk organik & kapur." },
    "Loamy": { "nama": "Tanah Lempung", "pH": "6.0 - 7.0", "organik": "Tinggi", "npk": "Tinggi", "subur": "Sangat Subur", "tanaman": "Hampir Semua Jenis Tanaman", "saran": "Tanah prima untuk semua tanaman." },
    "loam": { "nama": "Tanah Lempung", "pH": "6.0 - 7.0", "organik": "Tinggi", "npk": "Tinggi", "subur": "Sangat Subur", "tanaman": "Hampir Semua Jenis Tanaman", "saran": "Tanah prima untuk semua tanaman." },
    "Peat": { "nama": "Tanah Gambut", "pH": "3.0 - 5.0", "organik": "Sangat Tinggi", "npk": "Rendah", "subur": "Rendah", "tanaman": "Nanas, Kelapa Sawit", "saran": "Beri Dolomit & parit drainase." },
    "Red": { "nama": "Tanah Merah", "pH": "4.5 - 5.5", "organik": "Rendah", "npk": "Rendah", "subur": "Kurang", "tanaman": "Ubi Kayu, Karet", "saran": "Beri SP-36 dosis ekstra." },
    "Sandy": { "nama": "Tanah Berpasir", "pH": "5.5 - 7.0", "organik": "Rendah", "npk": "Rendah", "subur": "Rendah", "tanaman": "Kelapa, Semangka, Kacang Tanah", "saran": "Wajib tambah kompos tiap musim." },
    "Yellow": { "nama": "Tanah Kuning", "pH": "4.5 - 5.5", "organik": "Rendah", "npk": "Rendah", "subur": "Kurang", "tanaman": "Tanaman Keras/Kehutanan", "saran": "Pakai mulsa agar tak tererosi." }
};

    async function detectSoil() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) return alert('Pilih foto dulu, Raja!');

        const urlAppScript = "https://script.google.com/macros/s/AKfycbwe27jOBXR9DnTi9hIWLAwT1kMGf3rRSEFeM1xMCVOiWOhYyOkXol1kmpKGSPqAwkNgDw/exec";

        document.getElementById('loader').style.display = 'block';
        document.getElementById('loadText').style.display = 'block';
        document.getElementById('scanner').style.display = 'block';
        document.getElementById('btnDetect').disabled = true;
        document.getElementById('result').style.display = 'none';

        const reader = new FileReader();
        reader.onload = async function() {
            const base64Data = reader.result.split(',')[1];
            try {
                const response = await fetch(urlAppScript, {
                    method: "POST",
                    body: JSON.stringify({ image: base64Data })
                });
                const result = await response.json();
                const soilData = result.outputs[0].soil_type;
                const labelRaw = soilData.predicted_classes[0];
                const conf = (soilData.predictions[labelRaw].confidence * 100).toFixed(2);

                const infoTanah = kamusTanah[labelRaw] || { "nama": labelRaw, "subur": "-", "pH": "-", "organik": "-", "npk": "-", "saran": "Cek pH manual." };

                document.getElementById('resLabel').innerText = infoTanah.nama;
                document.getElementById('resConf').innerHTML = `
                    <div style="color: #00f2ff; margin-bottom: 12px; font-weight: bold;">Akurasi: ${conf}%</div>
                    <div style="text-align: left; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; font-size: 0.85rem;">
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px; color: #fff;">
                            <tr><td style="padding: 4px 0; opacity: 0.8;">Kesuburan</td><td style="text-align: right; color: var(--accent-color);"><b>${infoTanah.subur}</b></td></tr>
                            <tr><td style="padding: 4px 0; opacity: 0.8;">Estimasi pH</td><td style="text-align: right;">${infoTanah.pH}</td></tr>
                            <tr><td style="padding: 4px 0; opacity: 0.8;">Bahan Organik</td><td style="text-align: right;">${infoTanah.organik}</td></tr>
                            <tr><td style="padding: 4px 0; opacity: 0.8;">Kandungan NPK</td><td style="text-align: right;">${infoTanah.npk}</td></tr>
                            <tr><td style="padding: 8px 0 4px 0; opacity: 0.8; vertical-align: top;">Tanaman Cocok</td><td style="text-align: right; color: #ffd700;"><i>${infoTanah.tanaman}</i></td></tr>
                        </table>
                        <div style="border-top: 1px solid rgba(0,242,255,0.2); margin-top: 10px; padding-top: 10px;">
                            <p style="color: #fff; margin: 0;"><b>Saran PPL:</b><br>${infoTanah.saran}</p>
                        </div>
                    </div>`;
                document.getElementById('result').style.display = 'block';
                drawTriangle(labelRaw);
            } catch (err) {
                alert("Gagal terhubung!");
            } finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('loadText').style.display = 'none';
                document.getElementById('scanner').style.display = 'none';
                document.getElementById('btnDetect').disabled = false;
            }
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
</script>
</body>
</html>
